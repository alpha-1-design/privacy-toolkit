<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" ry="22" fill="#0a0f14"/>
  
  <!-- Shield shape -->
  <path d="M50 8
    C50 8 72 14 82 18
    C82 18 82 50 70 65
    C62 75 50 82 50 82
    C50 82 38 75 30 65
    C18 50 18 18 18 18
    C28 14 50 8 50 8Z"
    fill="none"
    stroke="#00d4ff"
    stroke-width="4"
    stroke-linejoin="round"
    filter="url(#glow)"
  />
  
  <!-- Checkmark -->
  <polyline
    points="34,51 44,62 66,38"
    fill="none"
    stroke="#00d4ff"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Glow filter -->
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
